<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login GED Financeiro - Faculdade Nova Roma</title>
    <link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
    <link rel="apple-touch-icon" href="favicon_io/apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="script.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 via-slate-50 to-slate-200 font-sans text-slate-900">
    <div class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-lg bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
            <div class="bg-blue-900 text-white p-8 text-center">
                <div class="flex items-center justify-center mb-4">
                    <img src="favicon_io/android-chrome-192x192.png" alt="Logo" class="w-16 h-16">
                </div>
                <h1 class="text-3xl font-bold">Acesso ao GED</h1>
                <p class="text-sm text-slate-200 mt-3">Autentique-se para acessar o painel financeiro e o fluxo de documentos.</p>
            </div>
            <div class="p-8">
                <form id="loginForm" class="space-y-5">
                    <div>
                        <label for="username" class="block text-xs font-semibold text-slate-600 uppercase mb-2">Usuário</label>
                        <input id="username" type="text" placeholder="admin" class="w-full border border-slate-300 rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-900 outline-none" required>
                    </div>
                    <div>
                        <label for="password" class="block text-xs font-semibold text-slate-600 uppercase mb-2">Senha</label>
                        <input id="password" type="password" placeholder="••••••••" class="w-full border border-slate-300 rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-900 outline-none" required>
                        <p class="text-xs text-slate-400 mt-2">Se for o primeiro acesso, digite a senha que deseja usar.</p>
                    </div>
                    <p id="loginError" class="hidden text-xs text-red-600">Usuário ou senha incorretos. Tente novamente.</p>
                    <button type="submit" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 rounded-2xl transition">Entrar</button>
                </form>
            </div>
        </div>
    </div>

<!-- Login logic moved to frontend/script.js to avoid duplicate declarations -->
</body>
</html>
